<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<aside id="sidebar">
  <div id="sidebar-header">
    <h1>Claudeboard</h1>
    <p>Claude code brain</p>
  </div>
  <nav>
    <a href="#overview" class="nav-link active" data-view="overview">
      Overview <span class="count" id="cnt-overview"></span>
    </a>
    <a href="#sessions" class="nav-link" data-view="sessions">
      Sessions <span class="count" id="cnt-sessions"></span>
    </a>
    <a href="#plans" class="nav-link" data-view="plans">
      Plans <span class="count" id="cnt-plans"></span>
    </a>
    <a href="#memories" class="nav-link" data-view="memories">
      Memories <span class="count" id="cnt-memories"></span>
    </a>
    <a href="#tasks" class="nav-link" data-view="tasks">
      Tasks <span class="count" id="cnt-tasks"></span>
    </a>
    <a href="#plugins" class="nav-link" data-view="plugins">
      Plugins <span class="count" id="cnt-plugins"></span>
    </a>
    <a href="#configs" class="nav-link" data-view="configs">
      Configs <span class="count" id="cnt-configs"></span>
    </a>
    <a href="#settings" class="nav-link" data-view="settings">
      Settings
    </a>
    <a href="#projects" class="nav-link" data-view="projects">
      Projects <span class="count" id="cnt-projects"></span>
    </a>
    <a href="#trash" class="nav-link" data-view="trash">
      Trash <span class="count" id="cnt-trash"></span>
    </a>
  </nav>
</aside>

<main id="main">
  <div id="view-container"></div>
</main>

<!-- Modal -->
<div id="modal-overlay">
  <div id="modal">
    <button id="modal-close" aria-label="Close">&times;</button>
    <div id="modal-content"></div>
  </div>
</div>

<script src="vendor/marked.min.js"></script>
<script src="app.js"></script>
</body>
</html>
